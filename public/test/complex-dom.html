<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BugDrop Complex DOM Test Page</title>
  <style>
    body { font-family: sans-serif; background: #1a1b26; color: #c0caf5; padding: 2rem; }
    .node { padding: 2px 4px; margin: 1px; font-size: 10px; border: 1px solid #3b4261; display: inline-block; }
    #node-count { color: #9ece6a; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Complex DOM Test Page</h1>
  <p>This page generates <span id="node-count">0</span> DOM nodes to test screenshot capture on complex pages.</p>
  <div id="complex-root"></div>

  <script>
    // Generate enough nodes to exceed the DOM_COMPLEXITY_THRESHOLD (3000)
    const TARGET_NODES = 4000;
    const root = document.getElementById('complex-root');
    for (let i = 0; i < TARGET_NODES; i++) {
      const el = document.createElement('span');
      el.className = 'node';
      el.textContent = i;
      root.appendChild(el);
    }
    document.getElementById('node-count').textContent =
      document.body.querySelectorAll('*').length;
  </script>

  <script src="/widget.js" data-repo="mean-weasel/bugdrop-widget-test" data-theme="dark"></script>
</body>
</html>
